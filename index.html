<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <section class="glass">
        <div class="nav">
          <div class="links">
            <div class="link">
              <div class="tablink" onclick="display(event, 'home')">Home</div>
            </div>
            <div class="link">
              <div class="tablink" onclick="display(event, 'projects')">
                Projects
              </div>
            </div>
          </div>
        </div>

        <div class="content">
          <!-- home tab-->
          <div id="home" class="text"></div>
          <!-- projects tab-->
          <div id="projects" class="display-none text">

            <div class="projects">
              <div class="project">
                <img class="proj-img" src="petsproj.png" />
                <span>Pet Adoption Project</span>
              </div>
              <div class="project">
                <img class="proj-img" src="stickynote.jpg" />
                <span>Sticky Note Pinboard</span>
              </div>
              <div class="project">
                <img class="proj-img" src="shift.jpg" />
                <span>Hackathon Doctors App</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- <div class="circle1"></div>
   <div class="circle2"></div> -->
    <script src="script.js"></script>
  </body>
</html>
